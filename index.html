<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Каталог вентиляции</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vent Catalog">
</head>
<body>
    <div id="app">
        <!-- Контент будет загружаться здесь -->
    </div>
    
    <!-- Модальное окно для детального описания товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="" class="modal-image">
                </div>
                <h2 id="modalTitle" class="modal-title"></h2>
                <div id="modalDescription" class="modal-description"></div>
                <div id="modalPrice" class="modal-price"></div>
            </div>
        </div>
    </div>
    
    <!-- Нижнее меню навигации -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="catalog">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Каталог</span>
        </div>
        <div class="nav-item" data-page="selection">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Подбор</span>
        </div>
        <div class="nav-item" data-page="configurator">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Конфигуратор</span>
        </div>
        <div class="nav-item" data-page="cart">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Корзина</span>
        </div>
        <div class="nav-item" data-page="orders">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Заказы</span>
        </div>
    </nav>
    
    <!-- Подключение PapaParse для парсинга CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Подключение EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
